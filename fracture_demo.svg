<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes slideUp { 0% { transform: translateY(10px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
      @keyframes barGrow { 0% { width: 0; } 100% { width: var(--w); } }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes countUp { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
      @keyframes scrollInsight {
        0%   { transform: translateY(0); }
        33%  { transform: translateY(-90px); }
        66%  { transform: translateY(-180px); }
        100% { transform: translateY(-270px); }
      }
      .header-fade { animation: fadeIn 0.6s ease-out both; }
      .card { animation: slideUp 0.5s ease-out both; }
      .card:nth-child(1) { animation-delay: 0.2s; }
      .card:nth-child(2) { animation-delay: 0.35s; }
      .card:nth-child(3) { animation-delay: 0.5s; }
      .card:nth-child(4) { animation-delay: 0.65s; }
      .panel { animation: fadeIn 0.8s ease-out 0.6s both; }
      .bar-fill { animation: barGrow 1.2s ease-out 1s both; }
      .count-anim { animation: countUp 0.3s ease-out both; }
      .footer-pulse { animation: pulse 3s ease-in-out infinite; }
      .scroll-content { animation: scrollInsight 15s ease-in-out 2s infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" fill="#0a0f16" rx="4"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="42" fill="#0d1a12" class="header-fade"/>
  <rect x="0" y="40" width="800" height="2" fill="#10b981" opacity="0.4"/>
  <text x="400" y="18" fill="#10b981" font-size="15" font-weight="bold" text-anchor="middle" class="header-fade">fracture — fragmentation dashboard</text>
  <text x="400" y="33" fill="#666" font-size="10" text-anchor="middle" class="header-fade">measuring your brain's context switch tax</text>

  <!-- Stat cards row -->
  <!-- Card 1: Switches Today -->
  <g class="card">
    <rect x="12" y="52" width="186" height="70" fill="#111a22" stroke="#333" stroke-width="1" rx="3"/>
    <text x="105" y="83" fill="#10b981" font-size="28" font-weight="bold" text-anchor="middle">214</text>
    <text x="105" y="105" fill="#666" font-size="10" text-anchor="middle">Switches Today</text>
  </g>

  <!-- Card 2: Lost to Switching -->
  <g class="card">
    <rect x="207" y="52" width="186" height="70" fill="#111a22" stroke="#333" stroke-width="1" rx="3"/>
    <text x="300" y="83" fill="#ef4444" font-size="28" font-weight="bold" text-anchor="middle">492m</text>
    <text x="300" y="105" fill="#666" font-size="10" text-anchor="middle">Lost to Switching</text>
  </g>

  <!-- Card 3: Effective Work -->
  <g class="card">
    <rect x="402" y="52" width="186" height="70" fill="#111a22" stroke="#333" stroke-width="1" rx="3"/>
    <text x="495" y="83" fill="#f59e0b" font-size="28" font-weight="bold" text-anchor="middle">1.3h</text>
    <text x="495" y="105" fill="#666" font-size="10" text-anchor="middle">Effective Work</text>
  </g>

  <!-- Card 4: Active Window Time -->
  <g class="card">
    <rect x="597" y="52" width="191" height="70" fill="#111a22" stroke="#333" stroke-width="1" rx="3"/>
    <text x="693" y="83" fill="#6366f1" font-size="28" font-weight="bold" text-anchor="middle">9.5h</text>
    <text x="693" y="105" fill="#666" font-size="10" text-anchor="middle">Active Window Time</text>
  </g>

  <!-- Zone Breakdown Panel (left) -->
  <g class="panel">
    <rect x="12" y="132" width="380" height="300" fill="#1a1405" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="22" y="156" fill="#f59e0b" font-size="12" font-weight="bold">Zone Breakdown</text>
    <line x1="14" y1="164" x2="390" y2="164" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>

    <!-- Creation bar: 47/214 = 22% -->
    <text x="22" y="186" fill="#10b981" font-size="11">Creation</text>
    <rect x="22" y="192" width="0" height="14" fill="#10b981" opacity="0.8" rx="2" class="bar-fill" style="--w: 80px"/>
    <text x="110" y="203" fill="#888" font-size="9">47 (22%)</text>

    <!-- Comm bar: 89/214 = 42% -->
    <text x="22" y="226" fill="#f59e0b" font-size="11">Communication</text>
    <rect x="22" y="232" width="0" height="14" fill="#f59e0b" opacity="0.8" rx="2" class="bar-fill" style="--w: 155px"/>
    <text x="185" y="243" fill="#888" font-size="9">89 (42%)</text>

    <!-- Consumption bar: 62/214 = 29% -->
    <text x="22" y="266" fill="#ef4444" font-size="11">Consumption</text>
    <rect x="22" y="272" width="0" height="14" fill="#ef4444" opacity="0.8" rx="2" class="bar-fill" style="--w: 108px"/>
    <text x="138" y="283" fill="#888" font-size="9">62 (29%)</text>

    <!-- Admin bar: 16/214 = 7% -->
    <text x="22" y="306" fill="#6366f1" font-size="11">Admin</text>
    <rect x="22" y="312" width="0" height="14" fill="#6366f1" opacity="0.8" rx="2" class="bar-fill" style="--w: 28px"/>
    <text x="58" y="323" fill="#888" font-size="9">16 (7%)</text>

    <!-- Unknown bar: 0 -->
    <text x="22" y="346" fill="#94a3b8" font-size="11">Unknown</text>
    <rect x="22" y="352" width="0" height="14" fill="#94a3b8" opacity="0.4" rx="2"/>
    <text x="28" y="363" fill="#555" font-size="9">0</text>

    <!-- Total row -->
    <line x1="14" y1="376" x2="390" y2="376" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>
    <text x="22" y="395" fill="#f59e0b" font-size="11" font-weight="bold">Productive: 47 creation switches</text>
    <text x="22" y="412" fill="#ef4444" font-size="11">Fragmentation: 167 wasteful switches (78%)</text>
  </g>

  <!-- Insights Panel (right) -->
  <g class="panel">
    <rect x="403" y="132" width="385" height="300" fill="#0a0a0a" stroke="#444" stroke-width="1" rx="3"/>
    <text x="413" y="156" fill="#888" font-size="12" font-weight="bold">Insights</text>
    <line x1="405" y1="164" x2="786" y2="164" stroke="#444" stroke-width="0.5" opacity="0.3"/>

    <clipPath id="insightClip">
      <rect x="405" y="165" width="381" height="265"/>
    </clipPath>
    <g clip-path="url(#insightClip)">
      <g class="scroll-content">
        <!-- Line 1 -->
        <text x="413" y="188" fill="#888" font-size="10">Today: 214 switches</text>
        <text x="413" y="204" fill="#888" font-size="10">Lost: 492 min to fragmentation</text>

        <!-- Warning insight -->
        <text x="413" y="228" fill="#ef4444" font-size="10">⚠ Effective work: 1.3h</text>
        <text x="413" y="244" fill="#ef4444" font-size="10">   You've spent more time switching than working.</text>

        <!-- Top zone -->
        <text x="413" y="268" fill="#f59e0b" font-size="10">Top zone: Communication</text>
        <text x="413" y="284" fill="#f59e0b" font-size="10">   89 switches wasted here.</text>

        <!-- Quote -->
        <text x="413" y="316" fill="#666" font-size="10" font-weight="bold">"Your brain is not a browser tab."</text>

        <!-- More stats -->
        <text x="413" y="348" fill="#888" font-size="10">86% of your active window time is lost to</text>
        <text x="413" y="364" fill="#888" font-size="10">context switching.</text>
        <text x="413" y="388" fill="#888" font-size="10">That's ~8.2 hours of fragmentation tax today.</text>

        <!-- Recommendation -->
        <text x="413" y="420" fill="#10b981" font-size="10">🌱 Try time-blocking: 90-min focus sessions</text>
        <text x="413" y="436" fill="#10b981" font-size="10">   with notification silencing.</text>
        <text x="413" y="452" fill="#10b981" font-size="10">📱 Move Slack/Teams to a secondary workspace.</text>
      </g>
    </g>
  </g>

  <!-- Footer bar -->
  <rect x="0" y="556" width="800" height="24" fill="#10b981" class="footer-pulse"/>
  <text x="400" y="572" fill="#000" font-size="11" text-anchor="middle" font-weight="bold">
    Fragmentation: 214 switches | 492m lost (86% of active time) | 1.3h effective
  </text>

  <!-- Blinking cursor indicator -->
  <rect x="790" y="556" width="8" height="24" fill="#0a0f16" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
